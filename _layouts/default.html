<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | 더브릿지플러스</title>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"> <style>
    /* 성호님이 요청하신 블로그 전용 디자인 추가 */
    .blog-nav { height: 70px; background: #2c2c2c; display: flex; align-items: center; padding: 0 20px; color: #fff; }
    .blog-nav .brand-name { font-size: 1.2rem; font-weight: 800; flex: 1; text-align: center; }
    .blog-nav .emoji-group { font-size: 1.5rem; cursor: pointer; display: flex; gap: 15px; }
    
    /* 네이버 스타일 카테고리 메뉴 (슥 내려오는 효과) */
    #categoryDrawer {
      position: fixed; top: 70px; left: 0; right: 0; background: #fff;
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out;
      z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    #categoryDrawer.open { max-height: 500px; padding: 20px 0; }
    #categoryDrawer ul { list-style: none; padding: 0 20px; margin: 0; }
    #categoryDrawer li { padding: 15px 0; border-bottom: 1px solid #eee; }
    #categoryDrawer a { color: #333; text-decoration: none; display: flex; justify-content: space-between; font-weight: 700; }
    #categoryDrawer .count { color: #007BFF; }
  </style>
</head>
<body>

  <nav class="blog-nav fixed-top">
    <a href="/"><img src="/images/logotop.png" style="height:40px;" alt="로고"></a>
    <div class="brand-name">더브릿지플러스</div>
    <div class="emoji-group">
      <span id="searchIcon">🔍</span>
      <span id="folderIcon">📂</span>
    </div>
  </nav>

  <div id="categoryDrawer">
    <ul>
      {% for category in site.categories %}
      <li>
        <a href="/blog/{{ category | first | slugify }}/">
          {{ category | first }} <span class="count">{{ category | last | size }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>

  <main style="padding-top: 100px; min-height: 80vh;">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="sf-bottom">
      <div class="sf-inner text-center py-4" style="background:#101010; color:#fff;">
        <p class="mb-0">© (주)더브릿지플러스 All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 이모지 클릭 동작
    document.getElementById('folderIcon').addEventListener('click', function() {
      document.getElementById('categoryDrawer').classList.toggle('open');
    });
  </script>
</body>
</html>
