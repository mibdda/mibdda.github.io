<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | 더브릿지플러스</title>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css">

  <style>
    /* [BLOG NAV] 상단바 */
    .blog-navbar { 
      background: #2c2c2c; height: 70px; position: fixed; top: 0; left: 0; right: 0; z-index: 2030;
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: #fff;
    }
    .brand-title-center { color: #fff; font-weight: 800; font-size: 1.2rem; position: absolute; left: 50%; transform: translateX(-50%); }
    .nav-icon { font-size: 1.5rem; cursor: pointer; color: #fff; }

    /* [SEARCH OVERLAY] 전면 검색 플로팅 (배경 100% 덮음) */
    #searchFullOverlay {
      position: fixed; inset: 0; background: #fff; z-index: 3000;
      display: none; flex-direction: column;
    }
    #searchFullOverlay.active { display: flex; }

    /* 검색바 상단 (뒤로가기 < | 입력창 | 전체 검색) */
    .search-header {
      height: 70px; display: flex; align-items: center; padding: 0 15px;
      border-bottom: 1px solid #eee; gap: 15px;
    }
    .search-back-btn { font-size: 1.5rem; color: #333; cursor: pointer; border: 0; background: none; }
    #searchInput {
      flex: 1; border: none; font-size: 1.1rem; outline: none; font-weight: 500;
    }
    .search-submit-btn {
      color: #007BFF; font-weight: 800; font-size: 1rem; border: 0; background: none; white-space: nowrap;
    }

    /* 인기 검색어 영역 */
    .popular-search-wrap { padding: 30px 20px; }
    .popular-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 20px; color: #111; }
    .popular-list { list-style: none; padding: 0; margin: 0; }
    .popular-item { 
      display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5;
      text-decoration: none; color: #333; font-size: 1rem;
    }
    .popular-num { color: #007BFF; font-weight: 900; margin-right: 15px; width: 20px; }

    /* 카테고리 메뉴 */
    #categoryDrawer {
      position: fixed; top: 70px; left: 0; right: 0; background: #fff;
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out;
      z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    #categoryDrawer.open { max-height: 500px; padding: 20px 0; border-bottom: 3px solid #003366; }
    #categoryDrawer ul { list-style: none; padding: 0 20px; margin: 0; }
    #categoryDrawer li { padding: 15px 0; border-bottom: 1px solid #eee; }
    #categoryDrawer a { color: #333; text-decoration: none; display: flex; justify-content: space-between; font-weight: 700; }

    main { padding-top: 100px; min-height: calc(100vh - 450px); }
  </style>
</head>
<body>

  <nav class="blog-navbar shadow-sm">
    <i class="fa-solid fa-folder-open nav-icon" id="folderIcon"></i>
    <div class="brand-title-center">더브릿지플러스</div>
    <i class="fa-solid fa-magnifying-glass nav-icon" id="searchIcon"></i>
  </nav>

  <div id="searchFullOverlay">
    <div class="search-header">
      <button class="search-back-btn" id="searchCloseBtn"><i class="fa-solid fa-chevron-left"></i></button>
      <input type="text" id="searchInput" placeholder="이 블로그 검색">
      <button class="search-submit-btn">전체 검색</button>
    </div>

    <div class="popular-search-wrap">
      <h4 class="popular-title">인기 검색어</h4>
      <div class="popular-list">
        <a href="/blog/tax/" class="popular-item"><span class="popular-num">1</span> 세무 가이드</a>
        <a href="/blog/grants/" class="popular-item"><span class="popular-num">2</span> 정부지원금 합격</a>
        <a href="/blog/corp/" class="popular-item"><span class="popular-num">3</span> 법인 설립 절차</a>
        <a href="/blog/registration/" class="popular-item"><span class="popular-num">4</span> 사업자 등록 방법</a>
        <a href="/blog/grants/" class="popular-item"><span class="popular-num">5</span> 예비창업패키지</a>
      </div>
    </div>
  </div>

  <div id="categoryDrawer">
    <ul>
      {% for category in site.categories %}
      <li>
        <a href="/blog/{{ category | first | slugify }}/">
          {{ category | first }} <span class="text-primary">{{ category | last | size }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer" id="footer">
    </footer>

  <script>
    const folderIcon = document.getElementById('folderIcon');
    const searchIcon = document.getElementById('searchIcon');
    const searchCloseBtn = document.getElementById('searchCloseBtn');
    const drawer = document.getElementById('categoryDrawer');
    const searchOverlay = document.getElementById('searchFullOverlay');

    // 📂 카테고리 토글
    folderIcon.onclick = () => {
      drawer.classList.toggle('open');
      searchOverlay.classList.remove('active');
    };

    // 🔍 검색창 열기 (전면 덮기)
    searchIcon.onclick = () => {
      searchOverlay.classList.add('active');
      drawer.classList.remove('open');
      document.getElementById('searchInput').focus();
    };

    // < 버튼 눌러서 닫기
    searchCloseBtn.onclick = () => searchOverlay.classList.remove('active');
  </script>
</body>
</html>
