<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>{{ page.title }} | 더브릿지플러스</title>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css">

  <style>
    /* 블로그 전용 기능 스타일 추가 (기존 기능 보존) */
    .blog-nav-icon { color: #fff; font-size: 1.3rem; cursor: pointer; background: none; border: 0; padding: 5px; transition: color 0.2s; }
    .blog-nav-icon:hover { color: #66CCFF; }
    
    /* 검색 오버레이 & 카테고리 드로워 (기존 default.html 로직 보존) */
    #searchFullOverlay { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; flex-direction: column; }
    #searchFullOverlay.active { display: flex; }
    .search-header { height: 80px; display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; gap: 20px; }
    #searchInput { flex: 1; border: none; font-size: 1.5rem; outline: none; font-weight: 600; }
    
    #categoryDrawer { 
      position: fixed; top: 80px; left: 0; right: 0; background: #fff; 
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out; 
      z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
    }
    #categoryDrawer.open { max-height: 500px; padding: 20px 0; border-bottom: 3px solid #003366; }
    
    main { padding-top: 120px; background: #fff; min-height: 80vh; }
  </style>
  
  </head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark slimbar fixed-top shadow-sm is-scrolled">
    <div class="container-fluid">
      <a class="navbar-brand brand-abs" href="/">
        <img alt="더브릿지플러스" src="/images/logotop.png" style="height:160px;"/>
      </a>

      <div class="d-none d-lg-flex flex-fill justify-content-center align-items-center" style="gap:30px;">
        <ul class="navbar-nav" style="gap:30px;">
          <li class="nav-item"><a class="nav-link" href="/#services">서비스</a></li>
          <li class="nav-item"><a class="nav-link" href="/#pricing">이용요금</a></li>
          <li class="nav-item"><a class="nav-link active" href="/blog">인사이트</a></li>
          <li class="nav-item"><a class="nav-link" href="/#faq">자주 묻는 질문</a></li>
        </ul>
      </div>

      <div class="ms-auto d-flex align-items-center gap-3">
        <button class="blog-nav-icon" id="folderIcon"><i class="fa-solid fa-folder-tree"></i></button>
        <button class="blog-nav-icon" id="searchIcon"><i class="fa-solid fa-magnifying-glass"></i></button>
        <a class="btn fw-bold nav-cta d-none d-md-inline-block" style="background:linear-gradient(135deg,#007BFF,#00BFFF); color:#fff; border-radius:24px; padding:8px 18px;" data-bs-toggle="modal" data-bs-target="#consultModal">문의하기</a>
      </div>
    </div>
  </nav>

  <div id="searchFullOverlay">
    <div class="search-header">
      <button class="border-0 bg-transparent" id="searchCloseBtn"><i class="fa-solid fa-chevron-left fs-3"></i></button>
      <input type="text" id="searchInput" placeholder="검색어를 입력하세요">
    </div>
    <div class="container py-5"><ul id="searchResults" class="list-unstyled"></ul></div>
  </div>

  <div id="categoryDrawer">
    <ul class="list-unstyled px-4">
      {% for category in site.categories %}
      <li class="py-3 border-bottom"><a href="/blog/{{ category | first | slugify }}/" class="text-dark text-decoration-none fw-bold d-flex justify-content-between">{{ category | first }} <span>{{ category | last | size }}</span></a></li>
      {% endfor %}
    </ul>
  </div>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer" id="footer">
    </footer>

  <script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
  <script>
    // 기존 검색/드로워 로직 유지
    const drawer = document.getElementById('categoryDrawer');
    const searchOverlay = document.getElementById('searchFullOverlay');
    
    document.getElementById('folderIcon').onclick = () => drawer.classList.toggle('open');
    document.getElementById('searchIcon').onclick = () => { searchOverlay.classList.add('active'); document.getElementById('searchInput').focus(); };
    document.getElementById('searchCloseBtn').onclick = () => searchOverlay.classList.remove('active');

    SimpleJekyllSearch({
      searchInput: document.getElementById('searchInput'),
      resultsContainer: document.getElementById('searchResults'),
      json: '/search.json',
      searchResultTemplate: '<li class="mb-3"><a href="{url}" class="text-dark fs-4 fw-bold">{title}</a></li>'
    });
  </script>
</body>
</html>
