---
layout: default
title: "투자·자금조달 인사이트 모아보기"
permalink: /blog/투자·자금조달/
---

<style>
  /* 카드 호버(마우스 올렸을 때) 애니메이션 */
  .blog-card { border-radius: 15px; transition: all 0.3s; cursor: pointer; background: #fff; }
  .blog-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
</style>

<div class="py-4">
  <h3 class="fw-bold mb-4">#투자·자금조달 관련 글 모아보기</h3>
  
  <div class="row">
    {% for post in site.categories['투자·자금조달'] %}
    <div class="col-md-6 mb-4">
      <a href="{{ post.url }}" class="text-decoration-none h-100 d-block">
        <div class="card h-100 border-0 shadow-sm blog-card p-3 d-flex flex-row align-items-center">
          
          <div class="card-body p-2 d-flex flex-column justify-content-center" style="flex: 1;">
            <div class="mb-2 text-truncate">
              {% for category in post.categories %}
                <span style="color: #0d6efd; font-weight: 800; margin-right: 6px; font-size: 0.85rem;">#{{ category }}</span>
              {% endfor %}
            </div>
            <h4 class="fw-bold text-dark mb-1" style="font-size: 1.15rem; line-height: 1.4;">{{ post.title }}</h4>
          </div>

          <div style="width: 100px; height: 100px; flex-shrink: 0; margin-left: 15px;">
            <img src="{{ post.image | default: '/images/logotop.png' }}" alt="{{ post.title }}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px; border: 1px solid #f1f3f5;">
          </div>

        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
