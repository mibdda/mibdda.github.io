---
layout: default
title: 창업 인사이트
---
<div class="container">
  <h2 class="fw-bold mb-5 text-center">전체 카테고리</h2>
  
  <div class="row">
    {% for post in site.posts %}
    <div class="col-md-6 mb-4">
      <div class="card h-100 border-0 shadow-sm" style="border-radius:15px;">
        <div class="card-body p-4">
          <span class="badge bg-primary mb-2">{{ post.categories | first }}</span>
          <h4 class="fw-bold"><a href="{{ post.url }}" class="text-dark text-decoration-none">{{ post.title }}</a></h4>
          <p class="text-muted small">{{ post.date | date: "%Y년 %m월 %d일" }}</p>
        </div>
      </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
      <p class="text-muted">아직 작성된 글이 없습니다. _posts 폴더에 첫 글을 남겨보세요!</p>
    </div>
    {% endfor %}
  </div>
</div>
