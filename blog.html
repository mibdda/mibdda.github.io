---
layout: default
title: 블로그 메인
---

<section class="container py-5">
  <h2 class="fw-bold mb-4">창업 인사이트</h2>
  
  <div class="row">
    {% for post in site.posts %}
    <div class="col-md-6 mb-4">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title fw-bold">
            <a href="{{ post.url }}" class="text-decoration-none text-dark">{{ post.title }}</a>
          </h5>
          <p class="card-text text-muted small">{{ post.excerpt | strip_html | truncate: 100 }}</p>
          <div class="text-primary small">{{ post.date | date: "%Y-%m-%d" }}</div>
        </div>
      </div>
    </div>
    {% else %}
    <p class="text-center py-5">아직 등록된 포스트가 없습니다.</p>
    {% endfor %}
  </div>
</section>
